name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf automake libtool libltdl-dev pkg-config \
            zlib1g-dev libncurses-dev libffi-dev libssl-dev \
            cmake build-essential

      # Android SDK/NDK と python-for-android のビルド成果物はサイズが大きく、
      # ゼロからのフルビルドは (成功時でも) 15〜25分かかる。
      # buildozer.spec が変わらない限り中身は同じなので、GitHub Actionsの
      # キャッシュに保存して2回目以降のビルドを大幅に短縮する。
      - name: Cache Buildozer global directory (SDK/NDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Cache Buildozer project build directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-project-

      - name: Install buildozer
        run: pip install --upgrade buildozer cython

      - name: Build APK with Buildozer
        run: yes | buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: habitgraph-debug-apk
          path: bin/*.apk
